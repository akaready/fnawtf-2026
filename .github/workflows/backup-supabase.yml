name: Daily Supabase Backup

on:
  schedule:
    - cron: '15 3 * * *'   # 03:15 UTC daily
  workflow_dispatch:

env:
  SKIP_BUCKETS: video-frames

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Install Supabase CLI + rclone + jq
        run: |
          curl -fsSL https://github.com/supabase/cli/releases/latest/download/supabase_linux_amd64.deb -o supabase.deb
          sudo dpkg -i supabase.deb
          curl -fsSL https://rclone.org/install.sh | sudo bash
          sudo apt-get install -y jq

      - name: Configure rclone for Supabase Storage
        env:
          S3_ACCESS_KEY: ${{ secrets.SUPABASE_S3_ACCESS_KEY_ID }}
          S3_SECRET_KEY: ${{ secrets.SUPABASE_S3_SECRET_ACCESS_KEY }}
          S3_ENDPOINT: ${{ secrets.SUPABASE_S3_ENDPOINT }}
          S3_REGION: ${{ secrets.SUPABASE_S3_REGION }}
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf <<EOF
          [supa]
          type = s3
          provider = Other
          access_key_id = ${S3_ACCESS_KEY}
          secret_access_key = ${S3_SECRET_KEY}
          endpoint = ${S3_ENDPOINT}
          region = ${S3_REGION}
          force_path_style = true
          EOF

      - name: Dump database (schema, data, roles)
        env:
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          mkdir -p backup/db
          supabase db dump --db-url "$DB_URL" -f backup/db/schema.sql
          supabase db dump --db-url "$DB_URL" --data-only -f backup/db/data.sql
          supabase db dump --db-url "$DB_URL" --role-only -f backup/db/roles.sql
          gzip backup/db/*.sql

      - name: Sync Storage buckets
        run: |
          mkdir -p backup/storage
          BUCKETS=$(rclone lsjson supa: | jq -r '.[].Name')
          SKIP="${SKIP_BUCKETS//,/ }"
          for b in $BUCKETS; do
            if echo " $SKIP " | grep -q " $b "; then
              echo "Skipping bucket: $b"
              continue
            fi
            echo "Syncing bucket: $b"
            rclone sync "supa:$b" "backup/storage/$b" --transfers 8 --checkers 16
          done
          tar -czf backup/storage.tar.gz -C backup/storage .
          rm -rf backup/storage

      - name: Write manifest
        env:
          COMMIT_SHA: ${{ github.sha }}
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          {
            echo "timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "commit: ${COMMIT_SHA}"
            echo "project_ref: ${PROJECT_REF}"
            echo "skipped_buckets: ${SKIP_BUCKETS}"
            echo ""
            echo "files:"
            ls -lh backup/db backup/storage.tar.gz
          } > backup/manifest.txt
          cat backup/manifest.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: supabase-backup-${{ github.run_id }}
          path: backup/
          retention-days: 90
          if-no-files-found: error
